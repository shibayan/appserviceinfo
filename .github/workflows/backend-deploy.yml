name: Deploy backend

on:
  push:
    branches: [ master ]
    paths:
      - .github/workflows/backend-deploy.yml
      - backend/**

env:
  DOTNET_VERSION: 10.0.x

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Use .NET ${{ env.DOTNET_VERSION }}
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: dotnet publish
      run: dotnet publish ./backend/AppServiceInfo -c Release -r win-x86 --no-self-contained -o dist

    - name: Upload artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: backend
        path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: publish
    environment: production
    strategy:
      matrix:
        location: [japaneast, eastus2, centralus, eastasia, southeastasia, northeurope, westeurope, koreacentral, australiaeast, francecentral, uksouth, canadacentral, centralindia, uaenorth, eastus, westus3, brazilsouth, norwayeast, switzerlandnorth, israelcentral, japanwest]
    permissions:
      id-token: write
      contents: read
    steps:
    - name: Azure Login
      uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
      with:
        client-id: ${{ vars.AZURE_CLIENT_ID }}
        tenant-id: ${{ vars.AZURE_TENANT_ID }}
        subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

    - name: Download artifact
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: backend
        path: dist

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@84a80cfe7e9889f35148ed88c307e6e93bf02578 # v3.0.7
      with:
        app-name: app-graffias-${{ matrix.location }}
        package: dist